# Fly.io deployment config for scoutai-montage
app = "scoutai-montage"
primary_region = "cdg"

[build]
  dockerfile = "ai_montage/Dockerfile"

[http_service]
  internal_port = 8002
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu = 1
  memory = "256mb"
