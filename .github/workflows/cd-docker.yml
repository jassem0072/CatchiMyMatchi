name: CD - Docker Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ai/**'
      - 'ai_montage/**'
      - 'admin/**'
      - 'docker-compose.yml'

concurrency:
  group: cd-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scoutai-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/scoutai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push AI service
        uses: docker/build-push-action@v6
        with:
          context: ./ai
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scoutai-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/scoutai-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push AI montage
        uses: docker/build-push-action@v6
        with:
          context: ./ai_montage
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scoutai-montage:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/scoutai-montage:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push admin
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scoutai-admin:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/scoutai-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
