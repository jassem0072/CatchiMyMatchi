name: CD - Android Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: cd-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build Release AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scoutai_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Validate Android release secrets
        run: |
          missing=""
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then missing="$missing ANDROID_KEYSTORE_BASE64"; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then missing="$missing KEYSTORE_PASSWORD"; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then missing="$missing KEY_ALIAS"; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then missing="$missing KEY_PASSWORD"; fi
          if [ -z "${{ secrets.API_BASE_URL }}" ]; then missing="$missing API_BASE_URL"; fi
          if [ -n "$missing" ]; then
            echo "Missing required secrets:$missing"
            exit 1
          fi
          echo "All Android release secrets are present."

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Setup Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: scoutai_flutter/android

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build release AAB
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: scoutai_flutter/build/app/outputs/bundle/release/app-release.aab
