# Fly.io deployment config for scoutai-backend
app = "scoutai-backend"
primary_region = "cdg"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu = 1
  memory = "256mb"
